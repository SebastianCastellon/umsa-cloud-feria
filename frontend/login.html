<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UMSA Cloud</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para login */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a3e6f 0%, #0f2b4a 100%);
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-logo img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            padding: 10px;
        }
        
        .login-logo h1 {
            color: #1a3e6f;
            margin-top: 15px;
            font-size: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #c9a03d;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1a3e6f 0%, #0f2b4a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
        }
        
        .error-message {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        .info-demo {
            margin-top: 20px;
            padding: 15px;
            background: #f0f4f8;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
        }
        
        .info-demo p {
            margin: 5px 0;
            color: #666;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Escudo_UMSA.svg/1200px-Escudo_UMSA.svg.png" alt="UMSA">
                <h1>🏛️ UMSA Cloud</h1>
                <p>Sistema Académico en la Nube</p>
            </div>
            
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>👤 Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>🔒 Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                
                <button type="submit" class="btn-login">Ingresar al Sistema</button>
            </form>
            
            <div class="info-demo">
                <p><strong>📋 Cuentas de demostración:</strong></p>
                <p><strong>Admin:</strong> admin / admin123</p>
                <p><strong>Estudiante:</strong> abigail / umsa2026</p>
                <p><strong>Estudiante:</strong> demo / demo123</p>
                <hr>
                <p style="font-size: 11px;">🔒 Sistema seguro con estándares ISO 27001</p>
            </div>
        </div>
    </div>
    
    <script>
        // USUARIOS PREDEFINIDOS (simulados, sin base de datos)
        const usuarios = {
            // Super usuario / Admin
            "admin": {
                password: "admin123",
                nombre: "Administrador UMSA",
                rol: "admin",
                carnet: null
            },
            // Estudiantes normales
            "abigail": {
                password: "umsa2026",
                nombre: "Abigail Goytia",
                rol: "estudiante",
                carnet: "10018381"
            },
            "demo": {
                password: "demo123",
                nombre: "Usuario Demo",
                rol: "estudiante",
                carnet: "1794688"
            }
        };
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            // Verificar credenciales
            const user = usuarios[username];
            
            if (user && user.password === password) {
                // Guardar sesión en localStorage
                const sessionData = {
                    username: username,
                    nombre: user.nombre,
                    rol: user.rol,
                    carnet: user.carnet,
                    loginTime: new Date().toISOString()
                };
                localStorage.setItem('umsa_session', JSON.stringify(sessionData));
                
                // Redirigir al sistema principal
                window.location.href = 'index.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Usuario o contraseña incorrectos';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
